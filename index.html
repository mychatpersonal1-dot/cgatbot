<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --wa-teal:#075E54;--wa-teal-dark:#054c44;--wa-green:#25D366;
            --wa-blue:#34B7F1;--wa-bg:#efeae2;--wa-panel:#f0f2f5;
            --wa-gray:#667781;--wa-border:#e9edef;--wa-header:#f0f2f5;
            --wa-outgoing:#d9fdd3;--shadow:0 1px 2px rgba(0,0,0,.13);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:#111b21;height:100vh;overflow:hidden;display:flex;flex-direction:column}
        .hidden{display:none!important}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

        /* LOGIN */
        #login-screen{position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#075E54,#128C7E);display:flex;align-items:center;justify-content:center}
        .login-card{background:#fff;border-radius:16px;padding:40px 32px;width:90%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
        .login-logo{width:72px;height:72px;background:var(--wa-green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
        .login-logo i{font-size:36px;color:#fff}
        .login-card h2{color:#111b21;font-size:22px;margin-bottom:6px}
        .login-card p{color:var(--wa-gray);font-size:14px;margin-bottom:24px}
        .login-input{width:100%;padding:14px 16px;border:1.5px solid var(--wa-border);border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;transition:border-color .2s}
        .login-input:focus{border-color:var(--wa-teal)}
        .login-btn{width:100%;padding:14px;background:var(--wa-green);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
        .login-btn:hover{background:#1db954}

        /* MAIN */
        #main-app{display:flex;height:100vh;overflow:hidden}

        /* SIDEBAR */
        #sidebar{width:420px;min-width:320px;background:#fff;display:flex;flex-direction:column;border-right:1px solid var(--wa-border)}
        .sidebar-header{background:var(--wa-header);padding:10px 16px;display:flex;align-items:center;min-height:60px;gap:12px}
        .sidebar-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0}
        .sidebar-avatar img{width:100%;height:100%;object-fit:cover}
        .sidebar-title{flex:1;font-size:18px;font-weight:500;color:#111b21}
        .sidebar-actions{display:flex;gap:4px}
        .icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--wa-gray);font-size:18px;transition:background .15s}
        .icon-btn:hover{background:rgba(0,0,0,.07)}
        .search-bar{padding:8px 16px;background:#fff;border-bottom:1px solid var(--wa-border)}
        .search-inner{background:var(--wa-panel);border-radius:8px;display:flex;align-items:center;padding:8px 12px;gap:10px}
        .search-inner i{color:var(--wa-gray);font-size:15px}
        .search-inner input{border:none;background:transparent;outline:none;font-size:15px;width:100%;color:#111b21}
        #user-list{flex:1;overflow-y:auto}
        .user-item{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--wa-border);cursor:pointer;transition:background .1s}
        .user-item:hover{background:var(--wa-panel)}
        .user-item.active{background:#f0f2f5}
        .user-avatar{width:49px;height:49px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-right:13px}
        .user-avatar img{width:100%;height:100%;object-fit:cover}
        .user-info{flex:1;min-width:0}
        .user-name{font-size:16px;color:#111b21;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .user-preview{font-size:14px;color:var(--wa-gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
        .user-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
        .user-time{font-size:12px;color:var(--wa-gray)}
        .unread-badge{background:var(--wa-green);color:#fff;border-radius:50%;width:20px;height:20px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}

        /* CHAT */
        #chat-area{flex:1;display:flex;flex-direction:column;background:var(--wa-bg);background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');overflow:hidden}
        #empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
        .empty-icon{width:200px;height:200px;background:#e9edef;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
        .empty-icon i{font-size:90px;color:#aebac1}
        #empty-state h2{font-size:32px;color:#41525d;font-weight:300;margin-bottom:12px}
        #empty-state p{font-size:14px;color:var(--wa-gray);max-width:380px;text-align:center}
        .chat-header{background:var(--wa-header);min-height:60px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--wa-border);gap:12px;z-index:10}
        .chat-header-name{font-size:17px;color:#111b21;font-weight:500}
        .chat-header-status{font-size:13px;color:var(--wa-gray)}
        #msg-area{flex:1;overflow-y:auto;padding:20px 8%;display:flex;flex-direction:column;gap:2px}
        .date-divider{text-align:center;margin:12px 0}
        .date-divider span{background:#e1f2fa;color:#54656f;font-size:12.5px;padding:5px 12px;border-radius:7px;box-shadow:var(--shadow)}
        .msg-wrapper{display:flex;flex-direction:column}
        .msg-wrapper.sent{align-items:flex-end}
        .msg-wrapper.received{align-items:flex-start}
        .msg{max-width:65%;padding:6px 10px 8px;border-radius:7.5px;position:relative;box-shadow:var(--shadow);word-wrap:break-word}
        .msg.sent{background:var(--wa-outgoing);border-top-right-radius:0}
        .msg.received{background:#fff;border-top-left-radius:0}
        .msg-text{font-size:14.5px;color:#111b21;line-height:1.45}
        .msg-img{max-width:280px;border-radius:5px;cursor:pointer;display:block}
        .msg-footer{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px}
        .msg-time{font-size:11px;color:#667781}
        .tick{font-size:13px;color:#aaa}
        .tick.blue{color:var(--wa-blue)}
        .msg-del{font-size:13px;color:#aebac1;cursor:pointer;margin-left:4px;opacity:0;transition:opacity .2s}
        .msg:hover .msg-del{opacity:1}
        .chat-input-bar{background:var(--wa-header);padding:8px 16px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--wa-border)}
        .input-box{flex:1;background:#fff;border-radius:22px;display:flex;align-items:center;padding:0 14px;min-height:44px;box-shadow:var(--shadow)}
        .input-box input{flex:1;border:none;outline:none;font-size:15px;padding:10px 0;color:#111b21;background:transparent}
        .input-box input::placeholder{color:var(--wa-gray)}
        .input-attach{color:var(--wa-gray);font-size:20px;cursor:pointer;margin-right:8px}
        .send-btn{width:44px;height:44px;border-radius:50%;background:var(--wa-teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0;box-shadow:var(--shadow);transition:background .2s}
        .send-btn:hover{background:var(--wa-teal-dark)}

        /* MOBILE */
        @media(max-width:768px){
            #sidebar{width:100%;min-width:unset}
            #chat-area{position:fixed;inset:0;z-index:500;transform:translateX(100%);transition:transform .25s ease}
            #chat-area.open{transform:translateX(0)}
            #empty-state{display:none}
            #msg-area{padding:10px 2%}
        }

        /* ADMIN */
        #admin-panel{position:fixed;inset:0;background:var(--wa-panel);z-index:9999;display:flex;flex-direction:column}
        .admin-header{background:var(--wa-teal);color:#fff;padding:0 16px;min-height:60px;display:flex;align-items:center;gap:16px}
        .admin-content{flex:1;overflow-y:auto;padding:16px}
        .admin-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
        .admin-card h4{color:var(--wa-teal);font-size:14px;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
        .admin-input{width:100%;padding:12px 14px;border:1.5px solid var(--wa-border);border-radius:8px;font-size:15px;margin-bottom:10px;outline:none}
        .admin-input:focus{border-color:var(--wa-teal)}
        .btn-add{width:100%;padding:12px;background:var(--wa-teal);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:15px}
        .admin-user-row{background:#f8f9fa;border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
        .admin-actions{display:flex;gap:16px}

        /* IMAGE PREVIEW */
        #preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:99999;display:none;align-items:center;justify-content:center;flex-direction:column}
        #preview-overlay img{max-width:95vw;max-height:85vh;border-radius:8px;object-fit:contain}
        .preview-close{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer}

        /* CALL SCREEN */
        #call-screen{position:fixed;inset:0;z-index:88888;display:none;background:#1a2530;flex-direction:column}
        #call-screen.active{display:flex}
        #remote-video-el{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#111b21;z-index:1;display:none}
        #local-video-el{position:absolute;bottom:120px;right:16px;width:120px;height:180px;border-radius:14px;object-fit:cover;z-index:5;border:2px solid rgba(255,255,255,.3);background:#222;display:none}
        .call-bg{position:absolute;inset:0;background:linear-gradient(160deg,#1a3a34,#111b21 60%,#0a1219);z-index:0}
        .call-overlay{position:relative;z-index:10;display:flex;flex-direction:column;height:100%}
        .call-top{padding:55px 0 24px;text-align:center}
        .call-avatar-ring{width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.25);box-shadow:0 0 0 12px rgba(255,255,255,.05),0 0 0 24px rgba(255,255,255,.02);margin:0 auto 18px}
        .call-avatar-ring img{width:100%;height:100%;object-fit:cover}
        .call-name{color:#fff;font-size:28px;font-weight:300;margin-bottom:8px}
        .call-status-text{color:rgba(255,255,255,.7);font-size:16px;letter-spacing:.5px}
        .call-timer{color:rgba(255,255,255,.9);font-size:20px;margin-top:6px;font-weight:300;letter-spacing:2px}
        .call-spacer{flex:1}
        .call-controls{padding:20px 20px 44px;display:flex;flex-wrap:wrap;justify-content:center;gap:24px}
        .call-btn-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
        .call-btn-label{font-size:12px;color:rgba(255,255,255,.75)}
        .call-btn{width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .15s,background .2s}
        .call-btn:active{transform:scale(.9)}
        .cb-mute,.cb-video,.cb-speaker,.cb-flip{background:rgba(255,255,255,.18);color:#fff}
        .cb-end{background:#f44336;color:#fff;width:70px;height:70px;font-size:26px}
        .cb-accept{background:#4caf50;color:#fff;width:70px;height:70px;font-size:26px}
        .call-btn.toggled{background:rgba(255,255,255,.85);color:#111}

        /* INCOMING */
        #incoming-call{position:fixed;inset:0;z-index:77777;display:none;background:linear-gradient(180deg,#1e3a3a,#111b21);flex-direction:column;align-items:center;justify-content:center}
        #incoming-call.active{display:flex}
        .incoming-avatar{width:130px;height:130px;border-radius:50%;overflow:hidden;border:4px solid rgba(255,255,255,.2);margin-bottom:20px}
        .incoming-name{color:#fff;font-size:32px;font-weight:300;margin-bottom:8px}
        .incoming-label{color:rgba(255,255,255,.6);font-size:16px;margin-bottom:60px}
        .incoming-actions{display:flex;gap:80px}
        .incoming-action{display:flex;flex-direction:column;align-items:center;gap:12px}
        .incoming-action span{color:rgba(255,255,255,.8);font-size:14px}
        @keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(76,175,80,.6)}70%{box-shadow:0 0 0 20px rgba(76,175,80,0)}100%{box-shadow:0 0 0 0 rgba(76,175,80,0)}}
        .pulse-ring{animation:pulse-ring 1.5s ease-out infinite}

        /* TOAST */
        #notif-toast{position:fixed;top:16px;right:16px;z-index:66666;background:#2a3942;color:#fff;border-radius:14px;padding:12px 18px;max-width:320px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);cursor:pointer}
        @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
        .notif-inner{display:flex;align-items:center;gap:12px}
        .notif-av{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0}
        .notif-av img{width:100%;height:100%;object-fit:cover}
        .notif-name{font-size:14px;font-weight:600;margin-bottom:2px}
        .notif-text{font-size:13px;color:rgba(255,255,255,.75)}

        /* NET STATUS */
        #net-status{position:fixed;top:0;left:0;right:0;text-align:center;padding:6px;font-size:13px;font-weight:500;z-index:55555;transform:translateY(-100%);transition:transform .3s}
        #net-status.show{transform:translateY(0)}
        #net-status.offline{background:#f44336;color:#fff}
        #net-status.online{background:#4caf50;color:#fff}
    </style>
</head>
<body>

<div id="net-status"></div>
<div id="preview-overlay" onclick="this.style.display='none'">
    <i class="fas fa-times preview-close"></i>
    <img id="preview-img" src="">
</div>
<div id="notif-toast"></div>

<!-- INCOMING CALL -->
<div id="incoming-call">
    <div class="incoming-avatar pulse-ring">
        <img id="incoming-avatar-img" src="" alt="">
    </div>
    <div class="incoming-name" id="incoming-caller-name">Caller</div>
    <div class="incoming-label" id="incoming-call-type">WhatsApp Audio Call</div>
    <div class="incoming-actions">
        <div class="incoming-action">
            <button class="call-btn cb-end" onclick="window.rejectCall()"><i class="fas fa-phone-slash"></i></button>
            <span>Decline</span>
        </div>
        <div class="incoming-action">
            <button class="call-btn cb-accept pulse-ring" onclick="window.acceptCall()"><i class="fas fa-phone"></i></button>
            <span>Accept</span>
        </div>
    </div>
</div>

<!-- ACTIVE CALL -->
<div id="call-screen">
    <div class="call-bg"></div>
    <video id="remote-video-el" autoplay playsinline></video>
    <video id="local-video-el" autoplay playsinline muted></video>
    <div class="call-overlay">
        <div class="call-top">
            <div class="call-avatar-ring"><img id="call-avatar-img" src="" alt=""></div>
            <div class="call-name" id="call-peer-name">User</div>
            <div class="call-status-text" id="call-status-text">Calling...</div>
            <div class="call-timer hidden" id="call-timer">00:00</div>
        </div>
        <div class="call-spacer"></div>
        <div class="call-controls">
            <div class="call-btn-wrap">
                <button class="call-btn cb-mute" id="btn-mute" onclick="window.toggleMute()"><i class="fas fa-microphone"></i></button>
                <span class="call-btn-label">Mute</span>
            </div>
            <div class="call-btn-wrap" id="btn-video-wrap">
                <button class="call-btn cb-video" id="btn-video" onclick="window.toggleVideo()"><i class="fas fa-video"></i></button>
                <span class="call-btn-label">Video</span>
            </div>
            <div class="call-btn-wrap">
                <button class="call-btn cb-speaker" id="btn-speaker" onclick="window.toggleSpeaker()"><i class="fas fa-volume-up"></i></button>
                <span class="call-btn-label">Speaker</span>
            </div>
            <div class="call-btn-wrap" id="btn-flip-wrap">
                <button class="call-btn cb-flip" onclick="window.flipCamera()"><i class="fas fa-sync-alt"></i></button>
                <span class="call-btn-label">Flip</span>
            </div>
            <div class="call-btn-wrap">
                <button class="call-btn cb-end" onclick="window.endCall()"><i class="fas fa-phone-slash"></i></button>
                <span class="call-btn-label">End</span>
            </div>
        </div>
    </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo"><i class="fab fa-whatsapp"></i></div>
        <h2>WhatsApp Pro</h2>
        <p>Sign in to continue</p>
        <input type="email" id="l-email" class="login-input" placeholder="Email address" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
        <input type="password" id="l-pass" class="login-input" placeholder="Password" onkeydown="if(event.key==='Enter')window.doLogin()">
        <button onclick="window.doLogin()" class="login-btn">SIGN IN</button>
    </div>
</div>

<!-- ADMIN -->
<div id="admin-panel" class="hidden">
    <div class="admin-header">
        <button class="icon-btn" style="color:#fff;" onclick="document.getElementById('admin-panel').classList.add('hidden')"><i class="fas fa-arrow-left"></i></button>
        <b style="font-size:18px;">Admin Dashboard</b>
    </div>
    <div class="admin-content">
        <div class="admin-card">
            <h4>Create New User</h4>
            <input type="email" id="new-user-email" class="admin-input" placeholder="User Email">
            <input type="text" id="new-user-pass" class="admin-input" placeholder="Password (min 6 chars)">
            <button onclick="window.createUser()" class="btn-add">ADD USER</button>
        </div>
        <div id="admin-user-list"></div>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-avatar"><img id="my-avatar-img" src="" alt=""></div>
            <div class="sidebar-title">WhatsApp</div>
            <div class="sidebar-actions">
                <button class="icon-btn hidden" id="admin-icon" onclick="window.showAdmin()" title="Admin"><i class="fas fa-shield-alt"></i></button>
                <button class="icon-btn" onclick="window.logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div class="search-bar">
            <div class="search-inner">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search or start new chat" oninput="window.filterUsers(this.value)">
            </div>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-area">
        <div id="empty-state">
            <div class="empty-icon"><i class="fab fa-whatsapp"></i></div>
            <h2>WhatsApp Web</h2>
            <p>Send and receive messages without keeping your phone online.</p>
        </div>
        <div id="chat-window" class="hidden" style="display:flex;flex-direction:column;height:100%;">
            <div class="chat-header">
                <button class="icon-btn" id="back-btn" onclick="window.closeChat()" style="display:none;"><i class="fas fa-arrow-left"></i></button>
                <div class="user-avatar" style="width:42px;height:42px;margin-right:0;"><img id="chat-avatar" src="" alt=""></div>
                <div style="flex:1;margin-left:12px;cursor:pointer;">
                    <div class="chat-header-name" id="chat-name">User</div>
                    <div class="chat-header-status" id="chat-lastseen">Offline</div>
                </div>
                <div style="display:flex;gap:4px;">
                    <button class="icon-btn" onclick="window.startCall('audio')" title="Audio Call"><i class="fas fa-phone"></i></button>
                    <button class="icon-btn" onclick="window.startCall('video')" title="Video Call"><i class="fas fa-video"></i></button>
                </div>
            </div>
            <div id="msg-area"></div>
            <div class="chat-input-bar">
                <label for="img-in" class="icon-btn" title="Attach"><i class="fas fa-paperclip"></i></label>
                <input type="file" id="img-in" class="hidden" accept="image/*" onchange="window.sendImage(this)">
                <div class="input-box">
                    <input type="text" id="m-input" placeholder="Type a message" onkeydown="if(event.key==='Enter')window.sendMsg()">
                    <label for="img-in" class="input-attach" title="Camera"><i class="fas fa-camera"></i></label>
                </div>
                <button class="send-btn" onclick="window.sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, updateDoc, doc, setDoc, deleteDoc, serverTimestamp, getDocs, getDoc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// YOUR FIREBASE CONFIG — unchanged
const firebaseConfig = {
    apiKey: "AIzaSyDIDlnsjU80luMXAO_JsRJQTMHPhEVpbQs",
    authDomain: "my-chat-project-4e376.firebaseapp.com",
    projectId: "my-chat-project-4e376",
    appId: "1:264696350288:web:8c0367e6dce7c5f5517355"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const ADMIN_EMAIL = "admin@gmail.com";

// State
let me=null, peer=null, pc=null, localStream=null;
let callMode=null, callTimerInterval=null, callSeconds=0;
let isMuted=false, isVideoOff=false, isSpeakerOn=true;
let currentCallId=null, allUsers=[], unsubMsg=null, unsubCall=null;
let incomingCallId=null, incomingCallData=null;
let callerIceBuf=[], calleeIceBuf=[], iceInterval=null;
let callerIceAdded=[], calleeIceAdded=[];

// Service Worker registration (for background push notifications)
async function initSW(){
    if(!('serviceWorker' in navigator))return;
    try{await navigator.serviceWorker.register('./sw.js');console.log('[SW] Registered');}
    catch(e){console.log('[SW] Note: run from a web server (not file://) for SW to work');}
}

// Browser push notification
function sendPush(title,body,onClick){
    if(Notification.permission!=='granted')return;
    try{
        const n=new Notification(title,{body,icon:avUrl(title),badge:avUrl(title),vibrate:[200,100,200]});
        if(onClick)n.onclick=()=>{window.focus();n.close();onClick()};
    }catch(e){}
}

// Toast
function showToast(email,text,onClick){
    const t=document.getElementById('notif-toast');
    t.innerHTML=`<div class="notif-inner"><div class="notif-av"><img src="${avUrl(email)}"></div><div><div class="notif-name">${email}</div><div class="notif-text">${text}</div></div></div>`;
    t.style.display='block';t.style.animation='slideIn .3s ease';
    t.onclick=()=>{t.style.display='none';if(onClick)onClick()};
    clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',5000);
    sendPush(email,text,onClick);
}

// Global message listener for notifications
function listenGlobalMsgs(){
    const q=query(collection(db,"messages"),orderBy("time","desc"),limit(1));
    onSnapshot(q,snap=>{
        snap.docChanges().forEach(change=>{
            if(change.type==="added"){
                const m=change.doc.data();
                if(m.sender!==me.email&&m.cid.includes(me.email)){
                    const isOpen=peer&&peer.email===m.sender;
                    if(!isOpen){msgSound.play().catch(()=>{});const txt=m.type==="image"?"📷 Photo":m.text;showToast(m.sender,txt,()=>openChat(m.sender));}
                }
            }
        });
    });
}

// User list
function loadList(){
    onSnapshot(collection(db,"users"),snap=>{
        allUsers=[];
        snap.forEach(d=>{if(d.data().email!==me.email)allUsers.push(d.data());});
        renderList(allUsers);
    });
}
function renderList(users){
    const list=document.getElementById('user-list');list.innerHTML="";
    users.forEach(u=>{
        const div=document.createElement('div');div.className='user-item';div.dataset.email=u.email;
        div.innerHTML=`<div class="user-avatar"><img src="${avUrl(u.email)}" alt=""></div>
            <div class="user-info"><div class="user-name">${u.email}</div>
            <div class="user-preview" id="prev-${u.email.replace(/[@.]/g,'-')}">Tap to chat</div></div>
            <div class="user-meta"><div class="user-time" id="time-${u.email.replace(/[@.]/g,'-')}"></div>
            <div class="unread-badge hidden" id="badge-${u.email.replace(/[@.]/g,'-')}">0</div></div>`;

function loadLastMsg(email){
    const cid=cidFor(me.email,email);
    onSnapshot(query(collection(db,"messages"),where("cid","==",cid),orderBy("time","desc"),limit(1)),snap=>{
        const id=email.replace(/[@.]/g,'-');
        const pe=document.getElementById('prev-'+id),te=document.getElementById('time-'+id);
        if(!snap.empty){
            const m=snap.docs[0].data();
            if(pe)pe.textContent=m.type==="image"?"📷 Photo":m.text;
            if(te){const d=new Date(m.time);te.textContent=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
        }
    });
    onSnapshot(query(collection(db,"messages"),where("cid","==",cid),where("sender","==",email),where("read","==",false)),snap=>{
        const b=document.getElementById('badge-'+email.replace(/[@.]/g,'-'));
        if(!b)return;
        if(snap.size>0){b.classList.remove('hidden');b.textContent=snap.size;}else b.classList.add('hidden');
    });
}

function openChat(email){

    document.getElementById('chat-avatar').src=avUrl(email);

    document.getElementById('back-btn').style.display=window.innerWidth<=768?'flex':'none';
    document.querySelectorAll('.user-item').forEach(el=>el.classList.remove('active'));

function listenMsgs(){
    if(unsubMsg)unsubMsg();
    const cid=cidFor(me.email,peer.email);
    let lastDate="";
    unsubMsg=onSnapshot(query(collection(db,"messages"),where("cid","==",cid),orderBy("time","asc")),snap=>{
        const area=document.getElementById('msg-area');area.innerHTML="";lastDate="";
        snap.forEach(d=>{
            const m=d.data();
            if(!m.read&&m.sender!==me.email)updateDoc(doc(db,"messages",d.id),{read:true});
            const md=new Date(m.time).toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
            if(md!==lastDate){lastDate=md;const dd=document.createElement('div');dd.className='date-divider';dd.innerHTML=`<span>${md}</span>`;area.appendChild(dd);}
            const wrap=document.createElement('div');wrap.className=`msg-wrapper ${m.sender===me.email?'sent':'received'}`;
            const bub=document.createElement('div');bub.className=`msg ${m.sender===me.email?'sent':'received'}`;
            const body=m.type==="image"?`<img src="${m.img}" class="msg-img" onclick="window.openPreview('${m.img}')">`:`<div class="msg-text">${m.text}</div>`;
            const del=m.sender===me.email?`<i class="fas fa-trash msg-del" onclick="window.deleteMessage('${d.id}')"></i>`:'';
            const ticks=m.sender===me.email?`<i class="fas fa-check-double tick${m.read?' blue':''}"></i>`:'';
            bub.innerHTML=`${body}<div class="msg-footer"><span class="msg-time">${m.dt}</span>${ticks}${del}</div>`;
            wrap.appendChild(bub);area.appendChild(wrap);
        });
        area.scrollTop=area.scrollHeight;
    });
}

window.sendMsg=async()=>{
    const inp=document.getElementById('m-input');

    const cid=cidFor(me.email,peer.email);
    await addDoc(collection(db,"messages"),{cid,sender:me.email,text:inp.value.trim(),type:"text",time:Date.now(),read:false,dt:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});

window.sendImage=input=>{
    const file=input.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
        const img=new Image();img.src=e.target.result;
        img.onload=async()=>{
            const canvas=document.createElement('canvas');let w=img.width,h=img.height;const MAX=800;
            if(w>h){if(w>MAX){h*=MAX/w;w=MAX;}}else{if(h>MAX){w*=MAX/h;h=MAX;}}
            canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
            const b64=canvas.toDataURL('image/jpeg',0.5);
            const cid=cidFor(me.email,peer.email);
            await addDoc(collection(db,"messages"),{cid,sender:me.email,img:b64,type:"image",time:Date.now(),read:false,dt:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
            input.value="";
        };
    };reader.readAsDataURL(file);
};

async function getMedia(video){
    const c={audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},video:video?{width:{ideal:1280},height:{ideal:720},facingMode:"user"}:false};
    try{return await navigator.mediaDevices.getUserMedia(c);}
    catch(e){
        if(video){try{return await navigator.mediaDevices.getUserMedia({audio:true,video:true});}catch{}try{return await navigator.mediaDevices.getUserMedia({audio:true,video:false});}catch{}}
        throw e;
    }
}

function createPC(){
    const p=new RTCPeerConnection(ICE);
    p.ontrack=e=>{const rv=document.getElementById('remote-video-el');rv.srcObject=e.streams[0];rv.play().catch(()=>{});};
    p.oniceconnectionstatechange=()=>{
        const s=p.iceConnectionState;
        if(s==='connected'||s==='completed'){
            document.getElementById('call-status-text').textContent="Connected";
            if(callSeconds===0)startTimer();
        }
        if(s==='disconnected'||s==='failed')endCallCleanup();
    };
    return p;
}

async function flushIce(role,cid){
    const buf=role==='caller'?callerIceBuf:calleeIceBuf;
    const field=role==='caller'?'callerIce':'calleeIce';
    if(!buf.length)return;
    const snap=await getDoc(doc(db,"calls",cid));if(!snap.exists())return;
    const existing=snap.data()[field]||[];
    const newOnes=buf.splice(0,buf.length);
    await updateDoc(doc(db,"calls",cid),{[field]:[...existing,...newOnes]});
}

window.startCall=async mode=>{
    if(!peer)return;callMode=mode;
    const isVideo=mode==='video';
    try{localStream=await getMedia(isVideo);}catch(e){return alert("Mic/Camera access denied: "+e.message);}
    showCallScreen(peer.email,'calling',isVideo);
    document.getElementById('local-video-el').srcObject=localStream;
    pc=createPC();localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    const cid=callDocId(me.email,peer.email);currentCallId=cid;callerIceBuf=[];callerIceAdded=[];calleeIceAdded=[];
    await setDoc(doc(db,"calls",cid),{caller:me.email,callee:peer.email,mode,status:"ringing",offer:null,answer:null,callerIce:[],calleeIce:[],ts:Date.now()});
    const offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:isVideo});
    await pc.setLocalDescription(offer);
    await updateDoc(doc(db,"calls",cid),{offer:{type:offer.type,sdp:offer.sdp}});
    pc.onicecandidate=e=>{if(e.candidate)callerIceBuf.push(e.candidate.toJSON());};
    iceInterval=setInterval(()=>flushIce('caller',cid),800);
    unsubCall=onSnapshot(doc(db,"calls",cid),async snap=>{
        const data=snap.data();if(!data)return;
        if(data.status==="answered"&&data.answer&&!pc.remoteDescription){
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
        if(data.calleeIce&&data.calleeIce.length>calleeIceAdded.length){
            const newCs=data.calleeIce.slice(calleeIceAdded.length);
            for(const c of newCs){try{await pc.addIceCandidate(new RTCIceCandidate(c));calleeIceAdded.push(c);}catch(e){}}
        }
        if(data.status==="rejected"){showToast(peer.email,"Call was declined","");endCallCleanup();}
        if(data.status==="ended")endCallCleanup();
    });
};

function listenIncoming(){
    const q=query(collection(db,"calls"),where("callee","==",me.email),where("status","==","ringing"));
    onSnapshot(q,snap=>{
        snap.docChanges().forEach(change=>{
            if(change.type==="added"){
                const data=change.doc.data();
                if(Date.now()-data.ts<60000)showIncomingUI(data.caller,data.mode,change.doc.id);
            }
        });
    });
}

function showIncomingUI(callerEmail,mode,docId){
    incomingCallId=docId;incomingCallData={callerEmail,mode};
    document.getElementById('incoming-caller-name').textContent=callerEmail;
    document.getElementById('incoming-avatar-img').src=avUrl(callerEmail);
    document.getElementById('incoming-call-type').textContent=mode==='video'?'📹 Incoming Video Call':'📞 Incoming Audio Call';
    document.getElementById('incoming-call').classList.add('active');
    playRing();
    sendPush(callerEmail,mode==='video'?'Incoming video call...':'Incoming call...',()=>document.getElementById('incoming-call').classList.add('active'));
}

window.acceptCall=async()=>{
    stopRing();document.getElementById('incoming-call').classList.remove('active');
    const{callerEmail,mode}=incomingCallData;callMode=mode;const isVideo=mode==='video';
    try{localStream=await getMedia(isVideo);}catch(e){return alert("Mic/Camera denied: "+e.message);}
    showCallScreen(callerEmail,'connecting',isVideo);
    document.getElementById('local-video-el').srcObject=localStream;
    pc=createPC();localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    currentCallId=incomingCallId;calleeIceBuf=[];callerIceAdded=[];calleeIceAdded=[];
    const cs=await getDoc(doc(db,"calls",currentCallId));const cd=cs.data();
    await pc.setRemoteDescription(new RTCSessionDescription(cd.offer));
    if(cd.callerIce){for(const c of cd.callerIce){try{await pc.addIceCandidate(new RTCIceCandidate(c));callerIceAdded.push(c);}catch(e){}}}
    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    pc.onicecandidate=e=>{if(e.candidate)calleeIceBuf.push(e.candidate.toJSON());};
    iceInterval=setInterval(()=>flushIce('callee',currentCallId),800);
    await updateDoc(doc(db,"calls",currentCallId),{answer:{type:answer.type,sdp:answer.sdp},status:"answered"});
    unsubCall=onSnapshot(doc(db,"calls",currentCallId),async snap=>{
        const data=snap.data();if(!data)return;
        if(data.callerIce&&data.callerIce.length>callerIceAdded.length){
            const newCs=data.callerIce.slice(callerIceAdded.length);
            for(const c of newCs){try{await pc.addIceCandidate(new RTCIceCandidate(c));callerIceAdded.push(c);}catch(e){}}
        }
        if(data.status==="ended")endCallCleanup();
    });
};

window.rejectCall=async()=>{
    stopRing();document.getElementById('incoming-call').classList.remove('active');
    if(incomingCallId)await updateDoc(doc(db,"calls",incomingCallId),{status:"rejected"}).catch(()=>{});
    incomingCallId=null;incomingCallData=null;
};

function showCallScreen(email,status,isVideo){
    document.getElementById('call-screen').classList.add('active');
    document.getElementById('call-peer-name').textContent=email;
    document.getElementById('call-avatar-img').src=avUrl(email);
    document.getElementById('call-status-text').textContent=status==='calling'?'Ringing...':'Connecting...';
    document.getElementById('call-status-text').style.display='';
    document.getElementById('call-timer').classList.add('hidden');
    document.getElementById('remote-video-el').style.display=isVideo?'block':'none';
    document.getElementById('local-video-el').style.display=isVideo?'block':'none';
    document.getElementById('btn-video-wrap').style.display=isVideo?'flex':'none';
    document.getElementById('btn-flip-wrap').style.display=isVideo?'flex':'none';
    isMuted=false;isVideoOff=false;isSpeakerOn=true;resetBtns();
}

function startTimer(){
    callSeconds=0;const te=document.getElementById('call-timer');
    te.classList.remove('hidden');document.getElementById('call-status-text').style.display='none';
    clearInterval(callTimerInterval);
    callTimerInterval=setInterval(()=>{callSeconds++;const m=Math.floor(callSeconds/60).toString().padStart(2,'0');const s=(callSeconds%60).toString().padStart(2,'0');te.textContent=`${m}:${s}`;},1000);
}

window.endCall=async()=>{
    if(currentCallId)await updateDoc(doc(db,"calls",currentCallId),{status:"ended"}).catch(()=>{});
    endCallCleanup();
};

function endCallCleanup(){
    stopRing();endSound.play().catch(()=>{});
    clearInterval(callTimerInterval);clearInterval(iceInterval);
    if(pc){pc.close();pc=null;}
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
    if(unsubCall){unsubCall();unsubCall=null;}
    document.getElementById('call-screen').classList.remove('active');
    document.getElementById('call-status-text').style.display='';
    document.getElementById('remote-video-el').srcObject=null;
    document.getElementById('remote-video-el').style.display='none';
    document.getElementById('local-video-el').srcObject=null;
    document.getElementById('local-video-el').style.display='none';
    resetBtns();currentCallId=null;callerIceBuf=[];calleeIceBuf=[];
}

function resetBtns(){
    const mb=document.getElementById('btn-mute'),vb=document.getElementById('btn-video');
    mb.classList.remove('toggled');mb.innerHTML='<i class="fas fa-microphone"></i>';
    if(vb){vb.classList.remove('toggled');vb.innerHTML='<i class="fas fa-video"></i>';}
    const sb=document.getElementById('btn-speaker');sb.classList.remove('toggled');sb.innerHTML='<i class="fas fa-volume-up"></i>';
}

window.toggleMute=()=>{
    isMuted=!isMuted;
    if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted);
    const b=document.getElementById('btn-mute');b.classList.toggle('toggled',isMuted);
    b.innerHTML=isMuted?'<i class="fas fa-microphone-slash"></i>':'<i class="fas fa-microphone"></i>';
};
window.toggleVideo=()=>{
    isVideoOff=!isVideoOff;
    if(localStream)localStream.getVideoTracks().forEach(t=>t.enabled=!isVideoOff);
    const b=document.getElementById('btn-video');b.classList.toggle('toggled',isVideoOff);
    b.innerHTML=isVideoOff?'<i class="fas fa-video-slash"></i>':'<i class="fas fa-video"></i>';
};
window.toggleSpeaker=()=>{
    isSpeakerOn=!isSpeakerOn;
    document.getElementById('remote-video-el').muted=!isSpeakerOn;
    const b=document.getElementById('btn-speaker');b.classList.toggle('toggled',!isSpeakerOn);
    b.innerHTML=isSpeakerOn?'<i class="fas fa-volume-up"></i>':'<i class="fas fa-volume-mute"></i>';
};
window.flipCamera=async()=>{
    if(!localStream)return;const vt=localStream.getVideoTracks()[0];if(!vt)return;
    const cur=vt.getSettings().facingMode||'user';const next=cur==='user'?'environment':'user';
    try{
        const ns=await navigator.mediaDevices.getUserMedia({video:{facingMode:next},audio:false});
        const nt=ns.getVideoTracks()[0];
        localStream.removeTrack(vt);localStream.addTrack(nt);
        if(pc){const s=pc.getSenders().find(s=>s.track?.kind==='video');if(s)await s.replaceTrack(nt);}
        document.getElementById('local-video-el').srcObject=localStream;vt.stop();
    }catch(e){console.log("Flip failed:",e.message);}
};

    const snap=await getDocs(collection(db,"users"));
    const div=document.getElementById('admin-user-list');div.innerHTML="";
    snap.forEach(d=>{const u=d.data();div.innerHTML+=`<div class="admin-user-row"><div><div style="font-weight:500">${u.email}</div><div style="font-size:12px;color:#667781">Pass: ${u.password||'—'}</div></div><div class="admin-actions"><i class="fas fa-key" style="color:#075E54;cursor:pointer;" onclick="window.changePass('${u.email}')"></i><i class="fas fa-trash" style="color:#f44336;cursor:pointer;" onclick="window.delUser('${u.email}')"></i></div></div>`;});
};
window.changePass=async email=>{const n=prompt("New Password (min 6):");if(n&&n.length>=6){await updateDoc(doc(db,"users",email),{password:n});alert("Updated!");window.showAdmin();}else if(n)alert("Too short!");};
window.createUser=async()=>{const e=document.getElementById('new-user-email').value.trim();const p=document.getElementById('new-user-pass').value.trim();if(!e||p.length<6)return alert("Fill both!");await setDoc(doc(db,"users",e),{email:e,password:p});alert("User created!");window.showAdmin();};
window.delUser=async id=>{if(confirm("Delete user?"))await deleteDoc(doc(db,"users",id)).then(()=>window.showAdmin());};
window.logout=()=>{setDoc(doc(db,"presence",me.email),{status:"offline"},{merge:true});signOut(auth).then(()=>location.reload());};

window.addEventListener('beforeunload',()=>{
    if(me)setDoc(doc(db,"presence",me.email),{status:"offline"},{merge:true});
    if(currentCallId)updateDoc(doc(db,"calls",currentCallId),{status:"ended"}).catch(()=>{});
});
</script>
</body>
</html>
