<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Pro - Fixed WebRTC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Wahi Rakhein jo aapne di thi, bas niche wala part add karein */
        .hidden { display: none !important; }
        #admin-panel { position: fixed; inset: 0; background: #fff; z-index: 5000; padding: 20px; }
    </style>
</head>
<body>
    <div id="call-screen">
        <h2 id="call-user-name">User Name</h2>
        <p id="call-timer">Connecting...</p>
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button class="c-btn hangup" onclick="window.endCall()"><i class="fas fa-phone-slash"></i></button>
            <button id="btn-answer" class="c-btn answer hidden" onclick="window.answerCall()"><i class="fas fa-phone"></i></button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <h3>Admin Panel</h3>
        <input type="email" id="new-user-email" placeholder="New User Email">
        <button onclick="window.createUser()">Register User</button>
        <div id="admin-user-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, updateDoc, onSnapshot, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ... [Aapka firebaseConfig yahan rahega] ...

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let me, peer, localStream, pc;

        // --- CORE FIX: Remote Stream Handling ---
        window.startCall = async (mode) => {
            localStream = await navigator.mediaDevices.getUserMedia({ video: mode === 'video', audio: true });
            document.getElementById('local-video').srcObject = localStream;
            
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }] });
            
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // CRITICAL FIX: Track arrival handling
            pc.ontrack = (event) => {
                document.getElementById('remote-video').srcObject = event.streams[0];
            };

            pc.onicecandidate = (e) => {
                if (e.candidate) addDoc(collection(doc(db, "calls", currentCallDocId), "offerCandidates"), e.candidate.toJSON());
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            // ... (baki Firestore logic wahi rahega)
        };

        // --- Admin: Create User ---
        window.createUser = async () => {
            const email = document.getElementById('new-user-email').value;
            // Admin sirf user create karega, auth ke baad firestore mein document bhi banayein
            await addDoc(collection(db, "users"), { email: email });
            alert("User Added!");
        };

        window.endCall = () => {
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (pc) pc.close();
            document.getElementById('call-screen').style.display = 'none';
        };

        // ... (Baaki logic wahi rahega)
    </script>
</body>
</html>
