<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro - Fixed WebRTC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-teal: #075E54; --wa-green: #25D366; --wa-blue: #34B7F1; --wa-bg: #efe7de; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #dadbd3; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        header { background: var(--wa-teal); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { position: fixed; inset: 0; background: var(--wa-bg); z-index: 2000; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s ease; }
        #chat-window.open { transform: translateX(0); }
        .msg-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; max-width: 80%; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }
        #call-screen { position: fixed; inset: 0; background: #075e54; z-index: 9999; display: none; flex-direction: column; align-items: center; color: white; padding: 50px 20px; }
        .video-container { position: relative; width: 100%; max-width: 400px; height: 70vh; background: #000; border-radius: 20px; overflow: hidden; margin-top: 20px; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 15px; right: 15px; width: 100px; height: 150px; background: #333; border: 2px solid white; border-radius: 10px; object-fit: cover; }
        .call-controls { margin-top: 30px; display: flex; gap: 20px; }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: white; }
        .hangup { background: #ff3b30; }
        .answer { background: #25D366; }
        .user-item { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>
    <div id="call-screen">
        <h2 id="call-user-name">User Name</h2>
        <p id="call-timer">Incoming Call...</p>
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>
        <div class="call-controls">
            <button id="btn-answer" class="c-btn answer hidden" onclick="window.answerCall()"><i class="fas fa-phone"></i></button>
            <button class="c-btn hangup" onclick="window.endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="login-screen" style="position:fixed; inset:0; background:var(--wa-teal); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:90%; max-width:350px;">
            <input type="email" id="l-email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="password" id="l-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="window.doLogin()" style="width:100%; padding:10px; background:var(--wa-green); border:none; color:white;">LOGIN</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header><b>WhatsApp</b></header>
        <div id="user-list"></div>
    </div>

    <div id="chat-window">
        <header><i class="fas fa-arrow-left" onclick="window.closeChat()"></i><b id="chat-name">User</b>
            <i class="fas fa-phone" onclick="window.startCall('audio')"></i>
            <i class="fas fa-video" onclick="window.startCall('video')"></i>
        </header>
        <div id="msg-area" class="msg-area"></div>
        <input type="text" id="m-input" placeholder="Type..." style="padding:10px;">
        <button onclick="window.sendMsg()">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, doc, setDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* APNA CONFIG YAHAN RAKHEIN */ };
        const db = getFirestore(initializeApp(firebaseConfig));
        const auth = getAuth();
        let me, peer, localStream, pc, currentCallDocId;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        window.startCall = async (mode) => {
            pc = new RTCPeerConnection(servers);
            localStream = await navigator.mediaDevices.getUserMedia({ video: mode === 'video', audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            document.getElementById('local-video').srcObject = localStream;

            const callDoc = doc(collection(db, "calls"));
            currentCallDocId = callDoc.id;

            pc.onicecandidate = (e) => { if(e.candidate) addDoc(collection(callDoc, "offerCandidates"), e.candidate.toJSON()); };
            pc.ontrack = (e) => { document.getElementById('remote-video').srcObject = e.streams[0]; };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(callDoc, { offer: { type: offer.type, sdp: offer.sdp }, to: peer.email, from: me.email, status: 'ringing', mode });
            
            document.getElementById('call-screen').style.display = 'flex';
            
            onSnapshot(callDoc, (snap) => {
                if(snap.data()?.answer && !pc.currentRemoteDescription) pc.setRemoteDescription(new RTCSessionDescription(snap.data().answer));
            });
            onSnapshot(collection(callDoc, "answerCandidates"), (snap) => {
                snap.docChanges().forEach(c => { if(c.type === 'added') pc.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
            });
        };

        window.answerCall = async () => {
            pc = new RTCPeerConnection(servers);
            const callDoc = doc(db, "calls", currentCallDocId);
            const data = (await getDoc(callDoc)).data();

            localStream = await navigator.mediaDevices.getUserMedia({ video: data.mode === 'video', audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            document.getElementById('local-video').srcObject = localStream;
            pc.ontrack = (e) => { document.getElementById('remote-video').srcObject = e.streams[0]; };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            pc.onicecandidate = (e) => { if(e.candidate) addDoc(collection(callDoc, "answerCandidates"), e.candidate.toJSON()); };
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await updateDoc(callDoc, { answer: { type: answer.type, sdp: answer.sdp }, status: 'active' });
            
            onSnapshot(collection(callDoc, "offerCandidates"), (snap) => {
                snap.docChanges().forEach(c => { if(c.type === 'added') pc.addIceCandidate(new RTCIceCandidate(c.doc.data())); });
            });
        };

        window.endCall = () => {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            document.getElementById('call-screen').style.display = 'none';
        };

        // Auth and Listeners... (Rest of your original logic stays same)
    </script>
</body>
</html>
