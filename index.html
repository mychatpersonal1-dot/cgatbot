<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro - Pure WebRTC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-teal: #075E54; --wa-green: #25D366; --wa-blue: #34B7F1; --wa-bg: #efe7de; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #dadbd3; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        /* Layout & Chat */
        header { background: var(--wa-teal); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { position: fixed; inset: 0; background: var(--wa-bg); z-index: 2000; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s ease; }
        #chat-window.open { transform: translateX(0); }
        .msg-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; max-width: 80%; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }

        /* WebRTC Call UI Overlay */
        #call-screen { position: fixed; inset: 0; background: #075e54; z-index: 9999; display: none; flex-direction: column; align-items: center; color: white; padding: 50px 20px; }
        .video-container { position: relative; width: 100%; max-width: 400px; height: 70vh; background: #000; border-radius: 20px; overflow: hidden; margin-top: 20px; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 15px; right: 15px; width: 100px; height: 150px; background: #333; border: 2px solid white; border-radius: 10px; object-fit: cover; }
        .call-controls { margin-top: 30px; display: flex; gap: 20px; }
        .c-btn { width: 65px; height: 65px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: white; }
        .hangup { background: #ff3b30; }
        .answer { background: #25D366; }
        .mute { background: rgba(255,255,255,0.2); }

        .user-item { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-item img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; }
        
        #admin-panel { position: fixed; inset: 0; background: #f0f2f5; z-index: 5000; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="call-screen">
        <h2 id="call-user-name">User Name</h2>
        <p id="call-timer">Incoming Call...</p>
        
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>

        <div class="call-controls">
            <button class="c-btn mute" onclick="window.toggleMic()"><i class="fas fa-microphone"></i></button>
            <button id="btn-answer" class="c-btn answer hidden" onclick="window.answerCall()"><i class="fas fa-phone"></i></button>
            <button class="c-btn hangup" onclick="window.endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header>
            <i class="fas fa-arrow-left" onclick="document.getElementById('admin-panel').classList.add('hidden')"></i>
            <b>Admin Dashboard</b>
            <span></span>
        </header>
        <div id="admin-user-list" style="padding:10px;"></div>
    </div>

    <div id="login-screen" style="position:fixed; inset:0; background:var(--wa-teal); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:90%; max-width:350px;">
            <h2 style="text-align:center; color:var(--wa-teal); margin-bottom:20px;">WhatsApp Pro</h2>
            <input type="email" id="l-email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
            <input type="password" id="l-pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
            <button onclick="window.doLogin()" style="width:100%; padding:12px; background:var(--wa-green); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">LOGIN</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <b>WhatsApp</b> 
            <div>
                <i class="fas fa-user-shield hidden" id="admin-icon" onclick="window.showAdmin()"></i>
                <i class="fas fa-sign-out-alt" onclick="window.logout()" style="margin-left:15px;"></i>
            </div>
        </header>
        <div id="user-list"></div>
    </div>

    <div id="chat-window">
        <header>
            <i class="fas fa-arrow-left" onclick="window.closeChat()"></i>
            <div style="flex:1; margin-left:10px;">
                <b id="chat-name">User</b>
                <div id="chat-lastseen" style="font-size:10px;">Offline</div>
            </div>
            <i class="fas fa-phone" onclick="window.startCall('audio')" style="margin-right:20px;"></i>
            <i class="fas fa-video" onclick="window.startCall('video')"></i>
        </header>
        <div id="msg-area" class="msg-area"></div>
        <div style="padding:10px; display:flex; background:#f0f0f0;">
            <input type="text" id="m-input" placeholder="Type a message..." style="flex:1; padding:10px; border-radius:20px; border:none;">
            <i class="fas fa-paper-plane" onclick="window.sendMsg()" style="color:var(--wa-teal); margin-left:10px; font-size:22px;"></i>
        </div>
    </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, doc, setDoc, deleteDoc, updateDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDIDlnsjU80luMXAO_JsRJQTMHPhEVpbQs", 
        authDomain: "my-chat-project-4e376.firebaseapp.com", 
        projectId: "my-chat-project-4e376", 
        appId: "1:264696350288:web:8c0367e6dce7c5f5517355"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let me = null, peer = null, localStream = null, pc = null;
    let currentCallDocId = null;

    const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    // --- WebRTC Logic (Caller) ---
    window.startCall = async (mode) => {
        if(!peer) return alert("Please select a user first!");
        
        const callDoc = doc(collection(db, "calls"));
        currentCallDocId = callDoc.id;

        pc = new RTCPeerConnection(servers);
        localStream = await navigator.mediaDevices.getUserMedia({ video: mode === 'video', audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        
        document.getElementById('local-video').srcObject = localStream;
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('call-user-name').innerText = peer.email;

        pc.ontrack = (event) => {
            document.getElementById('remote-video').srcObject = event.streams[0];
        };

        const offerCandidates = collection(callDoc, "offerCandidates");
        pc.onicecandidate = (event) => {
            if (event.candidate) addDoc(offerCandidates, event.candidate.toJSON());
        };

        const offerDescription = await pc.createOffer();
        await pc.setLocalDescription(offerDescription);

        await setDoc(callDoc, {
            offer: { type: offerDescription.type, sdp: offerDescription.sdp },
            to: peer.email, from: me.email, status: 'ringing', mode: mode
        });

        // Listen for Answer
        onSnapshot(callDoc, (snap) => {
            const data = snap.data();
            if (!pc.currentRemoteDescription && data?.answer) {
                pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                document.getElementById('call-timer').innerText = "Connected";
            }
            if (data?.status === 'ended') window.endCall(false);
        });

        // Listen for remote ICE candidates
        onSnapshot(collection(callDoc, "answerCandidates"), (snap) => {
            snap.docChanges().forEach((change) => {
                if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
            });
        });
    };

    // --- WebRTC Logic (Receiver) ---
    window.answerCall = async () => {
        const data = window.incomingCallData;
        document.getElementById('btn-answer').classList.add('hidden');
        document.getElementById('call-timer').innerText = "Connecting...";

        pc = new RTCPeerConnection(servers);
        localStream = await navigator.mediaDevices.getUserMedia({ video: data.mode === 'video', audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        document.getElementById('local-video').srcObject = localStream;

        pc.ontrack = (event) => {
            document.getElementById('remote-video').srcObject = event.streams[0];
        };

        const callDoc = doc(db, "calls", currentCallDocId);
        const answerCandidates = collection(callDoc, "answerCandidates");
        const offerCandidates = collection(callDoc, "offerCandidates");

        pc.onicecandidate = (event) => {
            if (event.candidate) addDoc(answerCandidates, event.candidate.toJSON());
        };

        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answerDescription = await pc.createAnswer();
        await pc.setLocalDescription(answerDescription);

        await updateDoc(callDoc, {
            answer: { type: answerDescription.type, sdp: answerDescription.sdp },
            status: 'active'
        });

        onSnapshot(offerCandidates, (snap) => {
            snap.docChanges().forEach((change) => {
                if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
            });
        });
        
        onSnapshot(callDoc, (snap) => { if (snap.data()?.status === 'ended') window.endCall(false); });
    };

    window.endCall = async (notify = true) => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (pc) pc.close();
        document.getElementById('call-screen').style.display = 'none';
        if (notify && currentCallDocId) {
            await updateDoc(doc(db, "calls", currentCallDocId), { status: 'ended' });
        }
        pc = null; localStream = null;
        document.getElementById('call-timer').innerText = "Incoming Call...";
    };

    // --- Inbound Call Listener ---
    function listenForInbound() {
        const q = query(collection(db, "calls"), where("to", "==", me.email), where("status", "==", "ringing"));
        onSnapshot(q, (snap) => {
            snap.docChanges().forEach(async (change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    currentCallDocId = change.doc.id;
                    document.getElementById('call-screen').style.display = 'flex';
                    document.getElementById('call-user-name').innerText = data.from;
                    document.getElementById('btn-answer').classList.remove('hidden');
                    window.incomingCallData = data;
                }
            });
        });
    }

    // --- Admin Dashboard Logic ---
    window.showAdmin = async () => {
        document.getElementById('admin-panel').classList.remove('hidden');
        const snap = await getDocs(collection(db, "users"));
        const div = document.getElementById('admin-user-list'); 
        div.innerHTML = "<h3 style='padding:10px;'>Registered Users</h3>";
        snap.forEach(d => {
            const u = d.data();
            div.innerHTML += `
                <div style="background:white; padding:15px; margin:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${u.email}</span>
                    <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="window.delUser('${d.id}')"></i>
                </div>`;
        });
    };

    window.delUser = async (id) => {
        if(confirm("Delete this user?")) {
            await deleteDoc(doc(db, "users", id));
            window.showAdmin();
        }
    };

    // --- Auth & Chat ---
    window.doLogin = async () => {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Login Failed: " + err.message));
    };

    onAuthStateChanged(auth, u => {
        if(u) {
            me = u;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            if(me.email === "admin@gmail.com") document.getElementById('admin-icon').classList.remove('hidden');
            listenForInbound();
            loadUsers();
        }
    });

    function loadUsers() {
        onSnapshot(collection(db, "users"), snap => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            snap.forEach(d => {
                if(d.data().email !== me.email) {
                    const div = document.createElement('div'); div.className = "user-item";
                    div.innerHTML = `<img src="https://ui-avatars.com/api/?name=${d.data().email}"> <b>${d.data().email}</b>`;
                    div.onclick = () => { 
                        peer = d.data(); 
                        document.getElementById('chat-window').classList.add('open'); 
                        document.getElementById('chat-name').innerText = peer.email; 
                        listenMessages(); 
                    };
                    list.appendChild(div);
                }
            });
        });
    }

    function listenMessages() {
        const cid = me.email < peer.email ? me.email + "_" + peer.email : peer.email + "_" + me.email;
        const q = query(collection(db, "messages"), where("cid", "==", cid), orderBy("time", "asc"));
        onSnapshot(q, snap => {
            const area = document.getElementById('msg-area'); area.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = `msg ${m.sender === me.email ? 'sent' : 'received'}`;
                div.innerText = m.text;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    window.sendMsg = async () => {
        const inp = document.getElementById('m-input');
        if(!inp.value.trim()) return;
        const cid = me.email < peer.email ? me.email + "_" + peer.email : peer.email + "_" + me.email;
        await addDoc(collection(db, "messages"), { cid, sender: me.email, text: inp.value, time: Date.now() });
        inp.value = "";
    };

    window.closeChat = () => { document.getElementById('chat-window').classList.remove('open'); peer = null; };
    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
