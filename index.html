<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro - WebRTC Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-teal: #075E54; --wa-green: #25D366; --wa-blue: #34B7F1; --wa-bg: #efe7de; --wa-dark: #0b141a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #dadbd3; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        header { background: var(--wa-teal); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .last-seen { font-size: 11px; color: #cfd8dc; display: block; }
        #chat-window { position: fixed; inset: 0; background: var(--wa-bg); z-index: 2000; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s ease; }
        #chat-window.open { transform: translateX(0); }
        .msg-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; max-width: 80%; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; font-size: 10px; color: #777; margin-top: 3px; }
        .del-msg { font-size: 11px; color: #b0bec5; margin-left: 8px; cursor: pointer; }
        .user-item { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-item img { width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; }

        /* WhatsApp WebRTC Call UI */
        #call-overlay { position: fixed; inset: 0; background: var(--wa-dark); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 20px; color: white; }
        .call-info { text-align: center; z-index: 10; }
        .call-info img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #555; margin-bottom: 15px; }
        .call-timer { font-size: 18px; color: #25D366; margin-top: 10px; font-weight: bold; }
        .call-btns { display: flex; gap: 40px; margin-bottom: 40px; z-index: 10; }
        .c-btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: none; color: white; transition: 0.3s; }
        .ans-btn { background: #25D366; }
        .rej-btn { background: #ff3b30; }
        #remote-v { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #local-v { position: absolute; top: 20px; right: 20px; width: 110px; height: 160px; border-radius: 10px; object-fit: cover; z-index: 5; background: #000; border: 1px solid #444; }

        #admin-panel { position: fixed; inset: 0; background: #f0f2f5; z-index: 5000; display: flex; flex-direction: column; }
        .admin-section { background: white; margin: 10px; padding: 15px; border-radius: 8px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="call-overlay">
        <video id="remote-v" autoplay playsinline></video>
        <video id="local-v" autoplay playsinline muted class="hidden"></video>
        <div class="call-info">
            <img id="call-img-ui" src="">
            <h2 id="call-user-ui">Username</h2>
            <div id="call-status-ui">Calling...</div>
            <div id="call-timer-ui" class="call-timer hidden">00:00</div>
        </div>
        <div class="call-btns">
            <button id="btn-ans" class="c-btn ans-btn hidden" onclick="window.acceptCall()"><i class="fas fa-phone"></i></button>
            <button class="c-btn rej-btn" onclick="window.hangup()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <header>
            <i class="fas fa-arrow-left" onclick="document.getElementById('admin-panel').classList.add('hidden')"></i>
            <b>Admin Dashboard</b>
            <span></span>
        </header>
        <div style="flex:1; overflow-y:auto;">
            <div class="admin-section">
                <h4>Create New User</h4>
                <input type="email" id="new-user-email" class="admin-input" placeholder="User Email">
                <input type="text" id="new-user-pass" class="admin-input" placeholder="User Password">
                <button onclick="window.createUser()" style="width:100%; padding:12px; background:var(--wa-teal); color:white; border:none; border-radius:5px;">ADD USER</button>
            </div>
            <div id="admin-user-list" style="padding:10px;"></div>
        </div>
    </div>

    <div id="login-screen" style="position:fixed; inset:0; background:var(--wa-teal); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:90%; max-width:350px;">
            <h2 style="text-align:center; color:var(--wa-teal); margin-bottom:20px;">WhatsApp Pro</h2>
            <input type="email" id="l-email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
            <input type="password" id="l-pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
            <button onclick="window.doLogin()" style="width:100%; padding:12px; background:var(--wa-green); color:white; border:none; border-radius:5px; font-weight:bold;">LOGIN</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <b>WhatsApp</b> 
            <div>
                <i class="fas fa-user-shield hidden" id="admin-icon" style="margin-right:20px; cursor:pointer;" onclick="window.showAdmin()"></i>
                <i class="fas fa-sign-out-alt" onclick="window.logout()" style="cursor:pointer;"></i>
            </div>
        </header>
        <div id="user-list"></div>
    </div>

    <div id="chat-window">
        <div style="background:var(--wa-teal); color:white; padding:10px; display:flex; align-items:center;">
            <i class="fas fa-arrow-left" onclick="window.closeChat()" style="padding:10px; cursor:pointer;"></i>
            <div style="flex:1; margin-left:10px;">
                <b id="chat-name">User</b>
                <span id="chat-lastseen" class="last-seen">Offline</span>
            </div>
            <i class="fas fa-phone" onclick="window.makeCall('audio')" style="margin-right:20px; cursor:pointer;"></i>
            <i class="fas fa-video" onclick="window.makeCall('video')" style="margin-right:10px; cursor:pointer;"></i>
        </div>
        <div id="msg-area" class="msg-area"></div>
        <div style="padding:10px; background:#f0f0f0; display:flex; align-items:center;">
            <label for="img-in"><i class="fas fa-camera" style="padding:10px; color:#555; cursor:pointer;"></i></label>
            <input type="file" id="img-in" class="hidden" accept="image/*" onchange="window.sendImage(this)">
            <input type="text" id="m-input" placeholder="Type a message..." style="flex:1; padding:10px; border-radius:20px; border:none; margin:0 10px; outline:none;">
            <i class="fas fa-paper-plane" onclick="window.sendMsg()" style="color:var(--wa-teal); font-size:22px; cursor:pointer;"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, updateDoc, doc, setDoc, deleteDoc, serverTimestamp, getDocs, getDoc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDIDlnsjU80luMXAO_JsRJQTMHPhEVpbQs", 
            authDomain: "my-chat-project-4e376.firebaseapp.com", 
            projectId: "my-chat-project-4e376", 
            appId: "1:264696350288:web:8c0367e6dce7c5f5517355"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let me = null, peer = null;
        const ADMIN_EMAIL = "admin@gmail.com";

        // --- WebRTC Variable & Config ---
        let pc = null;
        let localStream = null;
        let currentCallDocId = null;
        let timerInterval = null;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

       // Is updated function ko apne purane listenForCalls se badal dein
function listenForCalls() {
    onSnapshot(collection(db, "calls"), snap => {
        snap.docChanges().forEach(async change => {
            const data = change.doc.data();
            const id = change.doc.id;

            // 1. Naya call aane par
            if (change.type === "added" && data.to === me.email && data.status === "ringing") {
                incomingCallUI(id, data);
            }

            // 2. Call status update hone par
            if (change.type === "modified" && currentCallDocId === id) {
                // Agar samne wale ne call utha liya (Answer mil gaya)
                if (data.status === "accepted" && data.answer && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    console.log("Remote Description Set!");
                }

                // ICE Candidates exchange (Yahi "Connecting" ko khatam karta hai)
                if (data.offerIce && data.from !== me.email) {
                    try { await pc.addIceCandidate(new RTCIceCandidate(data.offerIce)); } catch(e){}
                }
                if (data.answerIce && data.to !== me.email) {
                    try { await pc.addIceCandidate(new RTCIceCandidate(data.answerIce)); } catch(e){}
                }

                // Call khatam hone par
                if (data.status === "ended") window.hangup(false);
            }
        });
    });
}

// Timer ko trigger karne wala event handler
// Isse pc.ontrack ke andar dalna hai taaki jab video/audio mil jaye tab timer shuru ho
function setupTracks() {
    pc.ontrack = e => {
        document.getElementById('remote-v').srcObject = e.streams[0];
        // Jaise hi stream mile, "Connecting" hata kar timer shuru karo
        if (e.streams[0]) {
            startTimer(); 
        }
    };
}

        // 2. Outgoing Call Logic
        window.makeCall = async (type) => {
            currentCallDocId = me.email.split('@')[0] + Date.now();
            showOverlay(peer.email, "Calling...", false);
            
            pc = new RTCPeerConnection(servers);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            if(type === 'video') {
                document.getElementById('local-v').classList.remove('hidden');
                document.getElementById('local-v').srcObject = localStream;
            }

            pc.onicecandidate = e => {
                if (e.candidate) updateDoc(doc(db, "calls", currentCallDocId), { offerIce: e.candidate.toJSON() });
            };
            pc.ontrack = e => document.getElementById('remote-v').srcObject = e.streams[0];

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            await setDoc(doc(db, "calls", currentCallDocId), {
                to: peer.email, from: me.email, status: "ringing", type,
                offer: { type: offer.type, sdp: offer.sdp }
            });
        };

        // 3. Incoming Call Logic
        function incomingCallUI(id, data) {
            currentCallDocId = id;
            showOverlay(data.from, `Incoming ${data.type} call...`, true);
        }

        window.acceptCall = async () => {
            const snap = await getDoc(doc(db, "calls", currentCallDocId));
            const data = snap.data();
            
            document.getElementById('btn-ans').classList.add('hidden');
            document.getElementById('call-status-ui').innerText = "Connecting...";

            pc = new RTCPeerConnection(servers);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: data.type === 'video' });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            if(data.type === 'video') {
                document.getElementById('local-v').classList.remove('hidden');
                document.getElementById('local-v').srcObject = localStream;
            }

            pc.onicecandidate = e => {
                if (e.candidate) updateDoc(doc(db, "calls", currentCallDocId), { answerIce: e.candidate.toJSON() });
            };
            pc.ontrack = e => document.getElementById('remote-v').srcObject = e.streams[0];

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            await updateDoc(doc(db, "calls", currentCallDocId), {
                answer: { type: answer.type, sdp: answer.sdp },
                status: "accepted"
            });
            startTimer();
        };

        // 4. Hangup Logic (Dono ke liye)
        window.hangup = async (notify = true) => {
            if (notify && currentCallDocId) await updateDoc(doc(db, "calls", currentCallDocId), { status: "ended" });
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (pc) pc.close();
            
            clearInterval(timerInterval);
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('call-timer-ui').classList.add('hidden');
            document.getElementById('local-v').classList.add('hidden');
            document.getElementById('remote-v').srcObject = null;
            currentCallDocId = null;
        };

        // Timer Function
        function startTimer() {
            document.getElementById('call-status-ui').innerText = "Connected";
            document.getElementById('call-timer-ui').classList.remove('hidden');
            let sec = 0;
            timerInterval = setInterval(() => {
                sec++;
                let m = Math.floor(sec / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                document.getElementById('call-timer-ui').innerText = `${m}:${s}`;
            }, 1000);
        }

        function showOverlay(user, status, incoming) {
            document.getElementById('call-overlay').style.display = 'flex';
            document.getElementById('call-user-ui').innerText = user;
            document.getElementById('call-status-ui').innerText = status;
            document.getElementById('call-img-ui').src = `https://ui-avatars.com/api/?name=${user}`;
            if(incoming) document.getElementById('btn-ans').classList.remove('hidden');
            else document.getElementById('btn-ans').classList.add('hidden');
        }

        // --- RE-INTEGRATING YOUR ORIGINAL FUNCTIONS ---

        window.doLogin = async () => {
            const e = document.getElementById('l-email').value.trim();
            const p = document.getElementById('l-pass').value.trim();
            if(!e || !p) return alert("Email/Pass bhariye!");
            const uSnap = await getDoc(doc(db, "users", e));
            if(uSnap.exists() && uSnap.data().password === p) {
                await signInWithEmailAndPassword(auth, e, p).catch(async () => {
                    await createUserWithEmailAndPassword(auth, e, p);
                });
            } else if(e === ADMIN_EMAIL) {
                await signInWithEmailAndPassword(auth, e, p).catch(async () => {
                    await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, "users", e), { email: e, password: p, role: "admin" });
                });
            } else { alert("Invalid Credentials!"); }
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                me = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                if(me.email === ADMIN_EMAIL) document.getElementById('admin-icon').classList.remove('hidden');
                setDoc(doc(db, "presence", me.email), { status: "online", last: serverTimestamp() }, { merge: true });
                loadList();
                listenForCalls();
            }
        });

        function loadList() {
            onSnapshot(collection(db, "users"), snap => {
                const list = document.getElementById('user-list'); list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    if(u.email !== me.email) {
                        const div = document.createElement('div'); div.className = "user-item";
                        div.innerHTML = `<img src="https://ui-avatars.com/api/?name=${u.email}"> <b>${u.email}</b>`;
                        div.onclick = () => openChat(u.email);
                        list.appendChild(div);
                    }
                });
            });
        }

        window.openChat = (email) => {
            peer = {email}; 
            document.getElementById('chat-window').classList.add('open');
            document.getElementById('chat-name').innerText = email;
            listen();
        };

        function listen() {
            const cid = me.email < peer.email ? me.email + "_" + peer.email : peer.email + "_" + me.email;
            const q = query(collection(db, "messages"), where("cid", "==", cid), orderBy("time", "asc"));
            onSnapshot(q, snap => {
                const area = document.getElementById('msg-area'); area.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.sender === me.email ? 'sent' : 'received'}`;
                    div.innerHTML = m.type === "image" ? `<img src="${m.img}" style="width:100%">` : `<div>${m.text}</div>`;
                    area.appendChild(div);
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        window.sendMsg = async () => {
            const inp = document.getElementById('m-input'); if(!inp.value) return;
            const cid = me.email < peer.email ? me.email + "_" + peer.email : peer.email + "_" + me.email;
            await addDoc(collection(db, "messages"), { cid, sender: me.email, text: inp.value, type: "text", time: Date.now(), dt: new Date().toLocaleTimeString() });
            inp.value = "";
        };

        window.showAdmin = async () => {
            document.getElementById('admin-panel').classList.remove('hidden');
            const snap = await getDocs(collection(db, "users"));
            const div = document.getElementById('admin-user-list'); div.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                div.innerHTML += `<div style="padding:10px; background:white; margin-bottom:5px;">${u.email} <i class="fas fa-trash" onclick="window.delUser('${u.email}')" style="float:right; color:red;"></i></div>`;
            });
        };

        window.createUser = async () => {
            const e = document.getElementById('new-user-email').value;
            const p = document.getElementById('new-user-pass').value;
            await setDoc(doc(db, "users", e), { email: e, password: p });
            window.showAdmin();
        };

        window.delUser = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "users", id)); window.showAdmin(); };
        window.logout = () => { signOut(auth).then(()=>location.reload()); };
        window.closeChat = () => { document.getElementById('chat-window').classList.remove('open'); };
    </script>
</body>
</html>
